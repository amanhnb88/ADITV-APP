name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Fitur tambahan: Menyimpan cache Gradle agar build selanjutnya instan
      - name: 🐘 Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠️ Generate Native Android Project (Prebuild)
        run: npx expo prebuild --platform android --clean

      # Di sinilah keajaiban dokumentasi React Native diterapkan!
      # Menambahkan arsitektur tunggal (arm64-v8a) dan configuration-cache
      - name: 🚀 Build Release APK (Optimized)
        run: |
          cd android
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --configuration-cache

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADITV-App-Release-Fast
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

