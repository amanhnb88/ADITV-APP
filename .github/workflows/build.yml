name: Build APK Nitro Speed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Caching resmi dari Gradle, jauh lebih ngebut dan stabil
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Dependencies
        run: npm install

      # Men-generate folder Android dari fresh (Khusus Expo)
      - name: Generate Native Android Project (Prebuild)
        run: npx expo prebuild --platform android --clean

      # Diinjeksi SETELAH prebuild agar tidak terhapus
      - name: Obat Anti Gigi Gatal (Bungkam Warning)
        run: |
          cat << 'EOF' >> android/build.gradle
          allprojects {
              tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                  kotlinOptions.suppressWarnings = true
              }
              tasks.withType(JavaCompile).configureEach {
                  options.compilerArgs << '-Xlint:none' << '-nowarn'
              }
          }
          EOF

      # NITRO MODE - Dioptimasi untuk Expo
      - name: Build APK (NITRO MODE)
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --max-workers=4 \
            -Porg.gradle.configuration-cache=false \
            --no-configuration-cache \
            -Porg.gradle.vfs.watch=false \
            -PreactNativeArchitectures=arm64-v8a \
            -x lint \
            -x test \
            --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ADITV-Nitro-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 1
