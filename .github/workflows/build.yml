name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # HAPUS BLOK GRADLE CACHE AGAR BUILD-NYA 100% BERSIH DARI NOL

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠️ Generate Native Android Project (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: 🚀 Build Release APK (Optimized)
        run: |
          cd android
          # Matikan paksa config cache dari argumen & hapus flag yang bikin masalah
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a -Porg.gradle.configuration-cache=false --no-configuration-cache

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADITV-App-Release-Fast
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
